server:
  port: 8080

spring:
  application:
    name: api-gateway

  #api gateway config
  cloud:
    gateway:
      routes:
        - id: shipping-service
          uri: lb://SHIPPING-SERVICE
          predicates:
            - Path=/api/v1/shipping/**
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**
          filters:
#            - StripPrefix=2
#            - RedirectTo=302, http://codingshuttle.com
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/v1/**
          filters:
#            - StripPrefix=2
            - AddRequestHeader=X-Custom-Header, Anuj
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka